<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Se-hun | Cloud Engineer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .status-badge {
            background-color: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h1 { color: #2c3e50; margin: 10px 0; }
        p { color: #7f8c8d; line-height: 1.6; }
        .tech-stack {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            background: #ebf5ff;
            color: #007bff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .footer { margin-top: 2rem; font-size: 0.7rem; color: #bdc3c7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="status-badge">● Container Running</div>
        <h1>박세훈 (Park Se-hun)</h1>
        <p>AWS & Docker 자동 배포 실습 성공!<br>현재 <strong>뭄바이(ap-south-1)</strong> 서버에서<br>Nginx 컨테이너로 서비스 중입니다.</p>
        
        <div class="tech-stack">
            <span class="tag">AWS SSM</span>
            <span class="tag">Docker</span>
            <span class="tag">GitHub Actions</span>
            <span class="tag">Nginx</span>
        </div>

        <div class="footer">
            Build with Gemini | Deployment v1.0.0
        </div>
    </div>
</body>
</html>
