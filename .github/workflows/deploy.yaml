name: Container Deployment via SSM

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy container via SSM
        run: |
          # 1. 인스턴스 ID 리스트의 쉼표를 공백으로 변환
          IDS=$(echo "${{ secrets.EC2_INSTANCE_ID }}" | tr ',' ' ')
          
          # 2. SSM 명령 전달 (기존 컨테이너 삭제 후 새 이미지 실행)
          aws ssm send-command \
            --instance-ids $IDS \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo docker stop nginx-container || true",
              "sudo docker rm nginx-container || true",
              "sudo docker run -d --name nginx-container -p 80:80 ${{ secrets.DOCKER_IMAGE }}"
            ]' \
            --region ${{ secrets.AWS_REGION }} \
            --comment "Deploying Nginx Container"